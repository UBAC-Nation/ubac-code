<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · UBAC</title>
    <link rel="stylesheet" href="/assets/css/up-rise.css">
    <style>
        /* Estilos adicionales solo para el iframe */
        .iframe-wrapper {
            background: #fffef7;
            border: 1px solid #e5e5e0;
            margin: 0;
        }
        
        iframe {
            width: 100%;
            height: calc(100vh - 61px);
            border: none;
            display: block;
            background: #fffef7;
        }
        
        /* Loading overlay para el iframe */
        .iframe-loading {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #fffef7;
            border: 1px solid #e5e5e0;
            padding: 12px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #1a1a1a;
            border-left: 3px solid #b33;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        
        .iframe-loading.visible {
            opacity: 1;
        }
        
        /* Ajuste para el contenedor principal */
        body {
            margin: 0;
            padding: 0;
            background: #fffef7;
        }
    </style>
</head>

<body>
    
    <!-- TOOLBAR SUPERIOR (igual a GitHub) -->
    <header class="ubac-header">
        <div class="ubac-header-left">
            <input type="text" class="ubac-search" id="globalSearch" placeholder="Buscar...">
        </div>
        <div class="ubac-header-right">
            <button class="ubac-icon-btn" aria-label="Notificaciones" id="notifBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </button>
            <button class="ubac-icon-btn" aria-label="Perfil" id="perfilBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </button>
        </div>
    </header>
    
    <div class="iframe-wrapper">
        <iframe id="mainFrame" src="search/" title="UBAC Content"></iframe>
    </div>
    
    <div id="iframeLoading" class="iframe-loading">Cargando contenido...</div>
    
    <script>
        const iframe = document.getElementById('mainFrame');
        const loadingDiv = document.getElementById('iframeLoading');
        const searchInput = document.getElementById('globalSearch');
        
        let loadingTimeout;
        
        function showLoading() {
            loadingDiv.classList.add('visible');
            clearTimeout(loadingTimeout);
            loadingTimeout = setTimeout(() => {
                loadingDiv.textContent = 'El contenido está tardando...';
            }, 3000);
        }
        
        function hideLoading() {
            loadingDiv.classList.remove('visible');
            loadingDiv.textContent = 'Cargando contenido...';
            clearTimeout(loadingTimeout);
        }
        
        // Eventos del iframe
        iframe.addEventListener('loadstart', showLoading);
        iframe.addEventListener('load', hideLoading);
        iframe.addEventListener('error', () => {
            hideLoading();
            console.error('Error al cargar el iframe');
        });
        
        // Timeout de seguridad
        setTimeout(hideLoading, 5000);
        
        // Comunicación con el iframe
        function sendToIframe(type, data) {
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type, data }, '*');
            }
        }
        
        // Búsqueda desde la toolbar
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    sendToIframe('buscar', { query: query });
                }
            }
        });
        
        // Botones de toolbar
        document.getElementById('notifBtn').addEventListener('click', () => {
            sendToIframe('notificaciones', null);
        });
        
        document.getElementById('perfilBtn').addEventListener('click', () => {
            sendToIframe('perfil', null);
        });
        
        // Recibir mensajes desde el iframe
        window.addEventListener('message', (event) => {
            const { type, data } = event.data || {};
            
            switch (type) {
                case 'actualizarBusqueda':
                    if (data?.query) {
                        searchInput.value = data.query;
                    }
                    break;
                case 'cambiarTitulo':
                    if (data?.title) {
                        document.title = `UBAC · ${data.title}`;
                    }
                    break;
                case 'mostrarNotificacion':
                    if (data?.message) {
                        loadingDiv.textContent = data.message;
                        loadingDiv.classList.add('visible');
                        setTimeout(() => {
                            loadingDiv.classList.remove('visible');
                            loadingDiv.textContent = 'Cargando contenido...';
                        }, 2000);
                    }
                    break;
            }
        });
        
        // Recargar iframe si es necesario (por ejemplo, al hacer clic en logo)
        document.querySelector('.ubac-logo').addEventListener('click', (e) => {
            e.preventDefault();
            iframe.src = iframe.src;
        });
    </script>
</body>

</html>
