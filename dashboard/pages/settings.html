<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes · UBAC</title>
    <link rel="stylesheet" href="/assets/css/up-rise.css">
    <style>
        body {
            background: var(--up-canvas);
            padding: 0;
            margin: 0;
        }
        .up-container {
            max-width: 100%;
            padding: 0;
        }
        .form-group {
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<div class="up-container">
    <div class="up-card">
        <div class="up-card-header">
            <h2>👤 Perfil público</h2>
            <p>Información que verán otros ciudadanos</p>
        </div>
        
        <div class="form-group">
            <label class="up-label">Nombre de usuario</label>
            <input type="text" class="up-input" id="username" placeholder="ciudadano_123" value="ciudadano_ubac">
        </div>
        
        <div class="form-group">
            <label class="up-label">Bio</label>
            <textarea class="up-input" rows="3" placeholder="Cuéntanos sobre ti...">Ciudadano digital en UBAC</textarea>
        </div>
        
        <div class="form-group">
            <label class="up-label">Email</label>
            <input type="email" class="up-input" id="email" placeholder="email@ejemplo.com" value="ciudadano@ubac.xyz">
        </div>
        
        <button class="up-btn up-btn-primary" onclick="guardarPerfil()">💾 Guardar cambios</button>
    </div>
    
    <div class="up-card">
        <div class="up-card-header">
            <h2>🔐 Seguridad</h2>
            <p>Gestiona tu hash y autenticación</p>
        </div>
        
        <div class="form-group">
            <label class="up-label">Tu hash VUB-25</label>
            <div class="up-hash" id="fullHash">000000G5861U</div>
            <button class="up-btn up-mt-4" onclick="copiarHashCompleto()">📋 Copiar hash completo</button>
        </div>
        
        <div class="up-separator"></div>
        
        <div class="form-group">
            <label class="up-label">Cambiar contraseña</label>
            <input type="password" class="up-input" placeholder="Nueva contraseña">
            <input type="password" class="up-input up-mt-2" placeholder="Confirmar contraseña">
            <button class="up-btn up-mt-2">🔄 Actualizar contraseña</button>
        </div>
    </div>
    
    <div class="up-card">
        <div class="up-card-header">
            <h2>🌐 Preferencias</h2>
            <p>Idioma, notificaciones y más</p>
        </div>
        
        <div class="form-group">
            <label class="up-label">Idioma</label>
            <select class="up-input">
                <option>Español</option>
                <option>English</option>
                <option>Português</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox"> 📧 Recibir notificaciones por correo
            </label>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox"> 🔔 Notificaciones push (PWA)
            </label>
        </div>
        
        <button class="up-btn">💾 Guardar preferencias</button>
    </div>
    
    <div class="up-separator"></div>
    <div class="up-footer">
        UBAC · País Digital sin fronteras
    </div>
</div>

<script>
    const hash = localStorage.getItem('ubac_hash') || '000000G5861U000000G5861U000000G5861U';
    document.getElementById('fullHash').innerText = hash;
    
    function copiarHashCompleto() {
        const hash = document.getElementById('fullHash').innerText;
        navigator.clipboard.writeText(hash);
        alert('Hash copiado al portapapeles');
    }
    
    function guardarPerfil() {
        alert('Perfil actualizado (demo)');
    }
</script>
</body>
</html>
