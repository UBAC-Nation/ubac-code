<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · UBAC</title>
    <link rel="stylesheet" href="/assets/css/up-rise.css">
</head>

<body>
    
    <!-- TOOLBAR SUPERIOR -->
    <header class="ubac-header">
        <div class="ubac-header-left">
            <input type="text" class="ubac-search" placeholder="Buscar...">
        </div>
        <div class="ubac-header-right">
            <button class="ubac-icon-btn" aria-label="Notificaciones">
                <svg viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </button>
            <button class="ubac-icon-btn" aria-label="Perfil">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </button>
        </div>
    </header>
    
    <!-- CONTENEDOR PRINCIPAL -->
    <div class="ubac-container">
        
    </div>
</body>

</html>
